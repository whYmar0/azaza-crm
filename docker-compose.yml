version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homematch
      POSTGRES_USER: homematch
      POSTGRES_PASSWORD: homematch_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homematch"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://homematch:homematch_secret@postgres:5432/homematch?sslmode=disable
      JWT_SECRET: supersecretjwtkey2026
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-demo_key}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      PORT: 8080
      HTTPS_PROXY: http://host.docker.internal:10809
      HTTP_PROXY: http://host.docker.internal:10809
      NO_PROXY: localhost,127.0.0.1,postgres
    volumes:
      - uploads:/app/uploads
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
